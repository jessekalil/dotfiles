[general]
import = ["~/.config/alacritty/tokyonight_night.toml"]

[terminal.shell]
program = "/usr/bin/zsh"
args = ["--login", "-c", "tmux new-session -A -s main"]

# [cursor.style]
# shape = "Beam"
# blinking = "On"

# [cursor.vi_mode_style]
# shape = "Beam"

[env]
TERM = "xterm-256color"

[font]
size = 12.0

# JetBrainsMono Nerd Font Mono,JetBrainsMono
[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
opacity = 0.9
padding.x = 1
padding.y = 1
decorations = "None"
startup_mode = "Maximized"

[keyboard]
bindings = [
    { key = "F11", action = "ToggleFullscreen" },
]
