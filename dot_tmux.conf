bind e setw synchronize-panes on
bind E setw synchronize-panes off

### Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'roosta/tmux-pop'
# set -g @plugin 'nhdaly/tmux-better-mouse-mode'
# set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @scroll-without-changing-pane 'on'
set -g @scroll-in-moused-over-pane 'on'
set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'
set -g @scroll-speed-num-lines-per-scroll '3'

### Plugins Options
set -g @extrakto_popup_size 70%

#### PowerKit
set -g @powerkit_plugins 'datetime,hostname'
set -g @powerkit_separator_style "rounded"
set -g @powerkit_theme 'tokyo-night'
set -g @powerkit_theme_variant 'night'
set -g @powerkit_theme_selector_key "C-t"

# Resurrect
set -g @continuum-restore 'on' 

run '~/.tmux/plugins/tpm/tpm'
